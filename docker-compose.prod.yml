version: '3.8'

# Production stack — all internal ports closed; nginx handles 80/443 only.
# Requires a .env file with: DOMAIN, DB_USER, DB_PASSWORD, DB_NAME, CERTBOT_EMAIL

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: forecasting-db
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME:-forecasting}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout:  5s
      retries:  5
    deploy:
      resources:
        limits:
          memory: 1G

  # ── FastAPI backend ───────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: forecasting-backend
    environment:
      DATABASE_URL:      postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME:-forecasting}
      SYNC_DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME:-forecasting}
      CORS_ORIGINS:      '["https://${DOMAIN}"]'
    depends_on:
      db:
        condition: service_healthy
    restart: always
    healthcheck:
      test:         ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus:   '1'
          memory: 2G
        reservations:
          cpus:   '0.25'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── React frontend (nginx static + internal /api proxy stripped) ──────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: forecasting-frontend
    restart: always
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout:  10s
      retries:  3
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── nginx — SSL termination + reverse proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: forecasting-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # nginx templates folder: files processed by envsubst → /etc/nginx/conf.d/
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - frontend
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Certbot — automatic SSL renewal every 12 hours ───────────────────────
  certbot:
    image: certbot/certbot
    container_name: forecasting-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"
    restart: unless-stopped

volumes:
  pg_data:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local
